<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0d;
    --bg-glow: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(217, 46, 66, 0.18), transparent 60%);
    --glass: rgba(255, 255, 255, 0.045);
    --glass-border: rgba(255, 255, 255, 0.09);
    --glass-hover: rgba(255, 255, 255, 0.07);
    --red: #d92e42;
    --red-bright: #ff4d61;
    --red-dim: #5c1620;
    --green: #6ee7a0;
    --text: #f2f0ee;
    --text-dim: #9a9a9f;
    --text-faint: #5c5c62;
    --radius: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background-color: var(--bg);
    background-image: var(--bg-glow);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .wrap { max-width: 760px; margin: 0 auto; padding: 32px 20px 100px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 12px; flex-wrap: wrap; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-logo { height: 32px; width: auto; display: block; }

  nav { display: flex; gap: 4px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 4px; backdrop-filter: blur(20px); }
  nav button {
    background: none; border: none; color: var(--text-dim); font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; padding: 7px 14px; border-radius: 8px; cursor: pointer;
    transition: all 0.15s ease;
  }
  nav button.active { background: var(--red); color: white; }
  nav button:not(.active):hover { color: var(--text); background: var(--glass-hover); }

  .card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .intro { margin-bottom: 20px; }
  .intro h2 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; margin: 0 0 6px; }
  .intro p { color: var(--text-dim); font-size: 14px; margin: 0; line-height: 1.5; }

  .stage-list { display: flex; flex-direction: column; gap: 10px; }

  .stage {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    transition: border-color 0.2s ease, opacity 0.2s ease;
  }
  .stage.recommended { border-color: rgba(217, 46, 66, 0.55); box-shadow: 0 0 0 1px rgba(217, 46, 66, 0.15), 0 0 24px rgba(217, 46, 66, 0.08); }

  .stage-index {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500;
    background: rgba(255,255,255,0.04); color: var(--text-faint); border: 1px solid var(--glass-border);
  }
  .stage.done .stage-index { background: rgba(217, 46, 66, 0.12); color: var(--red-bright); border-color: rgba(217, 46, 66, 0.3); }
  .stage.running .stage-index { background: var(--red); color: white; animation: pulse 1.4s ease-in-out infinite; }
  .stage.failed .stage-index { background: rgba(217, 46, 66, 0.15); color: var(--red-bright); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(217, 46, 66, 0.5); }
    50% { box-shadow: 0 0 0 8px rgba(217, 46, 66, 0); }
  }

  .stage-body { flex: 1; min-width: 200px; }
  .stage-title { font-size: 14.5px; font-weight: 600; margin: 0 0 2px; }
  .stage-desc { font-size: 12.5px; color: var(--text-dim); margin: 0; }
  .stage-status { font-size: 11px; font-family: 'JetBrains Mono', monospace; margin-top: 4px; display: flex; align-items: center; gap: 6px; }
  .stage.running .stage-status { color: var(--red-bright); }
  .stage.done .stage-status { color: var(--green); }
  .stage.failed .stage-status { color: var(--red-bright); }
  .stage-elapsed { color: var(--text-faint); }

  .run-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px; font-weight: 600;
    padding: 8px 16px; border-radius: 9px;
    cursor: pointer; transition: all 0.15s ease;
  }
  .run-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
  .stage.recommended .run-btn:not(:disabled) { background: var(--red); border-color: var(--red); }
  .stage.recommended .run-btn:hover:not(:disabled) { background: var(--red-bright); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .stage.failed .run-btn { border-color: rgba(217, 46, 66, 0.4); }

  .reset-btn {
    flex-shrink: 0; background: none; border: 1px solid var(--glass-border);
    color: var(--text-faint); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
    padding: 7px 14px; border-radius: 9px; cursor: pointer; transition: all 0.15s ease;
  }
  .reset-btn:hover { color: var(--text-dim); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }

  .audio-player {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px; padding: 8px 10px;
    background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
    border-radius: 10px; width: 100%;
  }
  .audio-play-btn {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    border: none; background: var(--red); color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s ease;
  }
  .audio-play-btn:hover { background: var(--red-bright); }
  .audio-play-btn svg { width: 11px; height: 11px; }
  .audio-play-btn .icon-pause { display: none; }
  .audio-player.playing .icon-play { display: none; }
  .audio-player.playing .icon-pause { display: block; }
  .audio-track {
    flex: 1; height: 4px; border-radius: 2px; cursor: pointer;
    background: rgba(255,255,255,0.08); position: relative;
  }
  .audio-track::before {
    /* widens the hit area for clicking/seeking without widening the visible bar */
    content: ""; position: absolute; top: -6px; bottom: -6px; left: 0; right: 0;
  }
  .audio-progress {
    position: absolute; left: 0; top: 0; height: 100%; width: 0%;
    background: var(--red); border-radius: 2px; pointer-events: none;
  }
  .audio-time {
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-dim); min-width: 74px; text-align: right;
  }

  .console-toggle {
    margin-top: 18px; background: none; border: none; color: var(--text-faint);
    font-family: 'Inter', sans-serif; font-size: 12.5px; cursor: pointer; padding: 8px 0;
  }
  .console-toggle:hover { color: var(--text-dim); }
  #console-panel { display: none; margin-top: 8px; padding: 16px; }
  #console-panel.open { display: block; }
  #log-output {
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.6;
    color: #8fdca0; max-height: 280px; overflow-y: auto; white-space: pre-wrap; margin: 0;
    word-break: break-word;
  }

  .history-card { padding: 14px 16px; display: flex; gap: 14px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .history-card video { width: 100px; height: 56px; border-radius: 8px; object-fit: cover; background: #000; flex-shrink: 0; }
  .history-meta { flex: 1; min-width: 160px; }
  .history-title { font-size: 14px; font-weight: 600; margin: 0 0 3px; word-break: break-word; }
  .history-sub { font-size: 12px; color: var(--text-dim); margin: 0; }
  .pill { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; margin-top: 5px; }
  .pill.private { background: rgba(217, 46, 66, 0.15); color: var(--red-bright); }
  .pill.none { background: rgba(255,255,255,0.06); color: var(--text-faint); }
  .history-status { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .youtube-link-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 5px;
    background: #ff0000; color: white; text-decoration: none;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11.5px;
    padding: 4px 11px 4px 8px; border-radius: 999px; transition: background 0.15s;
  }
  .youtube-link-btn:hover { background: #d90000; }
  .youtube-link-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .copy-link-btn {
    display: inline-flex; align-items: center; gap: 5px; margin-top: 5px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text-dim);
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11.5px;
    padding: 4px 10px; border-radius: 999px; cursor: pointer; transition: all 0.15s;
  }
  .copy-link-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .media-tile {
    position: relative; width: 88px; height: 88px; border-radius: 10px;
    overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border);
  }
  .media-tile img, .media-tile video { width: 100%; height: 100%; object-fit: cover; }
  .media-tile .order-badge {
    position: absolute; top: 4px; left: 4px; background: rgba(0,0,0,0.65);
    color: var(--text); font-size: 10px; font-family: 'JetBrains Mono', monospace;
    padding: 1px 5px; border-radius: 5px;
  }
  .media-tile .remove-tile-btn {
    position: absolute; top: 4px; right: 4px; background: rgba(217,46,66,0.85);
    color: white; border: none; width: 18px; height: 18px; border-radius: 5px;
    font-size: 11px; line-height: 1; cursor: pointer;
  }

  .section-title-row { display: flex; align-items: center; gap: 8px; margin: 28px 0 12px; }
  .section-title-row:first-child { margin-top: 0; }
  .section-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; margin: 0; }
  .count-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint);
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    padding: 1px 8px; border-radius: 999px;
  }

  .form-row { display: flex; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .form-row input { flex: 1 1 140px; min-width: 0; }
  input[type="text"], textarea {
    background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px; border-radius: 9px;
    outline: none; width: 100%;
  }
  input[type="text"]:focus, textarea:focus { border-color: var(--red); }

  select {
    background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 12px; border-radius: 9px;
    outline: none; width: 100%; cursor: pointer;
  }
  select:focus { border-color: var(--red); }
  /* Without this, <option> inherits the select's light `color` but the
     native popup list gets the browser/OS's own (usually light) background,
     so the text is nearly invisible once the dropdown is opened. */
  select option { background: #1a1a1e; color: var(--text); }

  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .settings-grid .field-full { grid-column: 1 / -1; }
  @media (max-width: 640px) { .settings-grid { grid-template-columns: 1fr; } }
  .field-label { font-size: 12px; color: var(--text-faint); margin-bottom: 6px; display: block; }

  .segmented { display: flex; border: 1px solid var(--glass-border); border-radius: 9px; overflow: hidden; }
  .segmented button {
    flex: 1; background: rgba(0,0,0,0.3); color: var(--text-dim); border: none; padding: 9px 12px;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .segmented button + button { border-left: 1px solid var(--glass-border); }
  .segmented button.active { background: var(--red); color: white; }

  .speed-row { display: flex; align-items: center; gap: 10px; }
  .speed-row input[type="range"] { flex: 1; accent-color: var(--red); }
  .speed-value { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); width: 42px; text-align: right; flex-shrink: 0; }
  .settings-hint { font-size: 11.5px; color: var(--text-faint); margin-top: 10px; line-height: 1.5; }

  .settings-summary {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .settings-summary-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .settings-summary-text .sep { color: var(--text-faint); margin: 0 6px; }
  .settings-summary-text .label { color: var(--text-faint); }
  .settings-change-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600; padding: 7px 14px;
    border-radius: 8px; cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .settings-change-btn:hover { background: rgba(255,255,255,0.1); }

  .voice-test-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .voice-test-row input[type="text"] { flex: 1 1 220px; min-width: 0; }
  .voice-test-btn {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600; padding: 9px 14px;
    border-radius: 9px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.15s;
  }
  .voice-test-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); }
  .voice-test-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .voice-test-audio { display: none; width: 100%; margin-top: 8px; height: 32px; }
  .voice-test-audio.visible { display: block; }
  .voice-test-hint { font-size: 11.5px; color: var(--text-faint); margin-top: 6px; line-height: 1.5; }

  .pron-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .pron-row {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 11px 14px; border-radius: 10px; background: rgba(255,255,255,0.03);
    border: 1px solid var(--glass-border); flex-wrap: wrap;
  }
  .pron-row .pron-text { min-width: 0; overflow-wrap: anywhere; font-size: 13px; color: var(--text-dim); flex: 1; }
  .pron-row .pron-text b { color: var(--text); }
  .pron-row .pron-arrow { color: var(--text-faint); margin: 0 4px; }
  .remove-btn {
    flex-shrink: 0; background: none; border: 1px solid var(--glass-border); color: var(--text-faint);
    cursor: pointer; font-size: 11.5px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    transition: all 0.15s;
  }
  .remove-btn:hover { color: var(--red-bright); border-color: rgba(217, 46, 66, 0.4); background: rgba(217, 46, 66, 0.08); }

  textarea { height: 220px; resize: vertical; line-height: 1.5; }
  .btn-primary {
    background: var(--red); color: white; border: none; font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 13px; padding: 9px 18px; border-radius: 9px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover:not(:disabled) { background: var(--red-bright); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .save-status { font-size: 12px; color: var(--text-faint); margin-top: 8px; }
  .char-count { font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace; margin-top: 6px; text-align: right; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-faint); font-size: 13px; }
  .error-card { padding: 16px; color: var(--red-bright); font-size: 13px; line-height: 1.5; }

  .skeleton-row { padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: center; }
  .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.08), rgba(255,255,255,0.03)); background-size: 200% 100%; animation: skeleton-loading 1.4s ease-in-out infinite; border-radius: 8px; }
  @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Media panel + file picker */
  .drop-zone {
    border: 1.5px dashed var(--glass-border); border-radius: 10px; padding: 14px;
    text-align: center; font-size: 12px; color: var(--text-faint); margin-bottom: 10px;
    transition: all 0.15s ease;
  }
  .drop-zone.drag-over { border-color: var(--red); background: rgba(217, 46, 66, 0.06); color: var(--text-dim); }
  .file-picker { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; min-width: 0; margin-bottom: 10px; }
  .file-picker-btn {
    background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: var(--text);
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12.5px;
    padding: 8px 16px; border-radius: 9px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
  }
  .file-picker-btn:hover { background: rgba(255,255,255,0.1); }
  .file-picker-summary { font-size: 12px; color: var(--text-faint); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1 1 120px; }
  .clear-media-btn {
    flex-shrink: 0; background: none; border: 1px solid var(--glass-border); color: var(--text-faint);
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 999px; cursor: pointer; transition: all 0.15s;
  }
  .clear-media-btn:hover { color: var(--red-bright); border-color: rgba(217, 46, 66, 0.4); background: rgba(217, 46, 66, 0.08); }

  /* Toasts */
  .toast-container {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 1000;
    width: calc(100% - 40px); max-width: 400px; align-items: center;
  }
  .toast {
    background: rgba(18,18,22,0.96); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px); padding: 11px 16px; border-radius: 10px;
    font-size: 12.5px; line-height: 1.4; box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    animation: toast-in 0.2s ease; width: 100%;
  }
  .toast.error { border-color: rgba(217, 46, 66, 0.5); color: var(--red-bright); }
  .toast.success { border-color: rgba(110, 231, 160, 0.35); color: var(--green); }
  @keyframes toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toast-out { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }

  button:focus-visible, input:focus-visible, textarea:focus-visible, a:focus-visible, label:focus-within {
    outline: 2px solid var(--red-bright); outline-offset: 2px;
  }

  /* Confirm modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(6,6,8,0.65); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; z-index: 1100;
    padding: 20px; opacity: 0; animation: overlay-in 0.15s ease forwards;
  }
  @keyframes overlay-in { to { opacity: 1; } }
  .modal-box {
    background: #131316; border: 1px solid var(--glass-border); border-radius: 16px;
    padding: 22px; max-width: 360px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transform: translateY(8px) scale(0.98); opacity: 0;
    animation: modal-in 0.18s ease forwards 0.02s;
  }
  @keyframes modal-in { to { transform: translateY(0) scale(1); opacity: 1; } }
  .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 15.5px; font-weight: 700; margin: 0 0 8px; }
  .modal-message { font-size: 13px; color: var(--text-dim); line-height: 1.5; margin: 0 0 20px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
  .modal-btn-cancel {
    background: none; border: 1px solid var(--glass-border); color: var(--text-dim);
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12.5px;
    padding: 8px 16px; border-radius: 9px; cursor: pointer; transition: all 0.15s;
  }
  .modal-btn-cancel:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .modal-btn-confirm {
    background: var(--red); border: 1px solid var(--red); color: white;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12.5px;
    padding: 8px 16px; border-radius: 9px; cursor: pointer; transition: background 0.15s;
  }
  .modal-btn-confirm:hover { background: var(--red-bright); }


  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  @media (max-width: 480px) {
    .wrap { padding: 20px 14px 90px; }
    .brand-logo { height: 26px; }
    nav { width: 100%; }
    nav button { flex: 1; }
    .run-btn { width: 100%; text-align: center; }
    .stage-body { min-width: 100%; }
    .history-card video { width: 100%; height: 160px; }
    .history-meta { min-width: 100%; }
  }
</style>

<script>
const STAGE_INFO = {
  script:     { title: "Write today's script",     desc: "Picks a fresh topic and writes the narration." },
  audio:      { title: "Record the narration",      desc: "Turns the script into spoken audio." },
  timestamps: { title: "Time the words",            desc: "Figures out exactly when each word is spoken." },
  subtitles:  { title: "Create captions",           desc: "Builds a caption file from the timing, uploaded as a toggleable track later, not burned into the video." },
  video:      { title: "Assemble the video",        desc: "Cuts your own dropped-in media (images/clips) to the narration's length. Images get a Ken Burns pan/zoom, clips play as-is. Drop your media into the <date>-media folder in output/ first." },
  upload:     { title: "Upload to YouTube",         desc: "Publishes the video as private, plus a toggleable caption track (CC menu)." },
};
const STAGE_ORDER = Object.keys(STAGE_INFO);
const VIDEO_EXT = new Set(["mp4", "mov", "m4v", "webm", "mkv"]);

let stages = [];
let stageState = {};
let stageStartTimes = {};
let anyStageRunning = false;
let elapsedTimerInterval = null;
let audioCacheBust = null; // only refreshes when audio actually regenerates, not on every re-render

// ---------- Toasts ----------
function showToast(message, type = "success", duration = 4000) {
  const container = document.getElementById("toast-container");
  const toast = document.createElement("div");
  toast.className = "toast " + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = "toast-out 0.2s ease forwards";
    setTimeout(() => toast.remove(), 200);
  }, duration);
}

// ---------- Confirm modal (replaces window.confirm) ----------
function showConfirm(message, { title = "Are you sure?", confirmLabel = "Confirm", cancelLabel = "Cancel" } = {}) {
  return new Promise((resolve) => {
    const root = document.getElementById("modal-root");
    const overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = `
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title-text">
        <p class="modal-title" id="modal-title-text">${title}</p>
        <p class="modal-message">${message}</p>
        <div class="modal-actions">
          <button class="modal-btn-cancel" id="modal-cancel-btn">${cancelLabel}</button>
          <button class="modal-btn-confirm" id="modal-confirm-btn">${confirmLabel}</button>
        </div>
      </div>
    `;
    root.appendChild(overlay);

    const cleanup = (result) => {
      document.removeEventListener("keydown", onKeydown);
      overlay.remove();
      resolve(result);
    };
    const onKeydown = (e) => {
      if (e.key === "Escape") cleanup(false);
      if (e.key === "Enter") cleanup(true);
    };

    overlay.querySelector("#modal-confirm-btn").addEventListener("click", () => cleanup(true));
    overlay.querySelector("#modal-cancel-btn").addEventListener("click", () => cleanup(false));
    overlay.addEventListener("click", (e) => { if (e.target === overlay) cleanup(false); });
    document.addEventListener("keydown", onKeydown);
    overlay.querySelector("#modal-confirm-btn").focus();
  });
}

// ---------- Elapsed time ----------
function formatElapsed(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(s / 60);
  const rem = s % 60;
  return m > 0 ? `${m}m ${rem}s` : `${rem}s`;
}
function startElapsedTimer() {
  stopElapsedTimer();
  elapsedTimerInterval = setInterval(() => {
    const runningId = Object.keys(stageState).find(id => stageState[id] === "running");
    if (!runningId) { stopElapsedTimer(); return; }
    const el = document.getElementById("elapsed-" + runningId);
    if (el) el.textContent = formatElapsed(Date.now() - (stageStartTimes[runningId] || Date.now()));
  }, 1000);
}
function stopElapsedTimer() {
  if (elapsedTimerInterval) { clearInterval(elapsedTimerInterval); elapsedTimerInterval = null; }
}

// ---------- Skeletons ----------
function renderSkeleton(container, rows = 3) {
  container.innerHTML = "";
  for (let i = 0; i < rows; i++) {
    const div = document.createElement("div");
    div.className = "card skeleton-row";
    div.innerHTML = `
      <div class="skeleton" style="width:60px; height:40px; border-radius:8px; flex-shrink:0;"></div>
      <div style="flex:1;">
        <div class="skeleton" style="width:60%; height:12px; margin-bottom:8px;"></div>
        <div class="skeleton" style="width:40%; height:10px;"></div>
      </div>
    `;
    container.appendChild(div);
  }
}
function renderErrorCard(container, message) {
  container.innerHTML = `<div class="card error-card">Couldn't load this: ${message}. Make sure the dashboard server is still running, then try switching tabs again.</div>`;
}

document.getElementById("reset-progress-btn").addEventListener("click", async () => {
  const ok = await showConfirm("This only resets what's shown here. It doesn't delete any files.", {
    title: "Reset progress?", confirmLabel: "Reset", cancelLabel: "Cancel",
  });
  if (!ok) return;
  stages.forEach((s) => { stageState[s.id] = "idle"; });
  audioCacheBust = null;
  anyStageRunning = false;
  stopElapsedTimer();
  document.getElementById("log-output").textContent = "";
  renderStages();
  showToast("Progress reset.", "success", 2000);
});

document.querySelectorAll("nav button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    ["pipeline","history","settings"].forEach(v => {
      document.getElementById("view-" + v).style.display = v === btn.dataset.view ? "block" : "none";
    });
    if (btn.dataset.view === "history") loadHistory();
    if (btn.dataset.view === "settings") { loadPronunciations(); loadScript(); }
  });
});

function recommendedStage() {
  for (const id of STAGE_ORDER) {
    if (stageState[id] !== "done") return id;
  }
  return null;
}

function buildMediaPanelElement() {
  const div = document.createElement("div");
  div.className = "card";
  div.id = "media-panel";
  div.style.padding = "16px";
  div.style.marginBottom = "10px";
  div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:6px;">
      <span style="font-size:13px; font-weight:600;">Media for today's video</span>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="media-stem-label" style="font-size:11px; color:var(--text-faint);"></span>
        <button class="clear-media-btn" id="clear-media-btn" style="display:none;" title="Remove all media for today's video">Clear all</button>
      </div>
    </div>
    <div id="media-grid" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;"></div>
    <div class="drop-zone" id="media-drop-zone">Drag &amp; drop images or clips here</div>
    <div class="file-picker">
      <input type="file" id="media-file-input" multiple accept="image/*,video/*" hidden />
      <label for="media-file-input" class="file-picker-btn">Choose files</label>
      <span class="file-picker-summary" id="file-picker-summary">No files selected</span>
    </div>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <button class="btn-primary" id="media-upload-btn" disabled>Upload</button>
      <span id="media-upload-status" style="font-size:12px; color:var(--text-faint);"></span>
    </div>
    <p style="font-size:11.5px; color:var(--text-faint); margin:8px 0 0;">Drop your images/clips here before running "Assemble the video" below. They're uploaded in the order you select them.</p>
  `;

  const fileInput = div.querySelector("#media-file-input");
  const summary = div.querySelector("#file-picker-summary");
  const uploadBtn = div.querySelector("#media-upload-btn");
  const dropZone = div.querySelector("#media-drop-zone");
  const status = div.querySelector("#media-upload-status");
  const clearBtn = div.querySelector("#clear-media-btn");

  clearBtn.addEventListener("click", async () => {
    let files;
    try {
      const res = await fetch("/api/media");
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      ({ files } = await res.json());
    } catch (err) {
      showToast("Couldn't check current media: " + err.message, "error");
      return;
    }
    if (!files.length) return;

    const ok = await showConfirm(
      `This removes all ${files.length} file${files.length === 1 ? "" : "s"} for today's video from the media folder. Handy if you're starting fresh for the next one.`,
      { title: "Clear all media?", confirmLabel: "Clear all", cancelLabel: "Cancel" }
    );
    if (!ok) return;

    clearBtn.disabled = true;
    const results = await Promise.allSettled(
      files.map(filename => fetch("/api/media/" + encodeURIComponent(filename), { method: "DELETE" })
        .then(r => { if (!r.ok) throw new Error(filename); }))
    );
    const failed = results.filter(r => r.status === "rejected").length;
    if (failed === 0) {
      showToast(`Cleared ${files.length} file${files.length === 1 ? "" : "s"}.`, "success");
    } else {
      showToast(`Cleared ${files.length - failed} file(s), ${failed} failed to remove.`, "error");
    }
    clearBtn.disabled = false;
    loadMedia();
  });

  function updateFileSummary() {
    const files = fileInput.files;
    if (!files.length) {
      summary.textContent = "No files selected";
      uploadBtn.disabled = true;
      return;
    }
    summary.textContent = files.length === 1 ? files[0].name : `${files.length} files selected`;
    uploadBtn.disabled = false;
  }

  fileInput.addEventListener("change", updateFileSummary);

  ["dragenter", "dragover"].forEach(evt => dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropZone.classList.add("drag-over");
  }));
  ["dragleave", "drop"].forEach(evt => dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
  }));
  dropZone.addEventListener("drop", (e) => {
    if (!e.dataTransfer || !e.dataTransfer.files.length) return;
    try {
      const dt = new DataTransfer();
      Array.from(fileInput.files).forEach(f => dt.items.add(f));
      Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
      fileInput.files = dt.files;
    } catch {
      fileInput.files = e.dataTransfer.files;
    }
    updateFileSummary();
  });

  uploadBtn.addEventListener("click", async () => {
    if (!fileInput.files.length) return;
    const formData = new FormData();
    for (const file of fileInput.files) formData.append("files", file);

    uploadBtn.disabled = true;
    status.textContent = "Uploading…";
    try {
      const res = await fetch("/api/media/upload", { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Upload failed");
      status.textContent = `Added ${data.saved.length} file(s).`;
      showToast(`Added ${data.saved.length} file(s) to today's media.`, "success");
      fileInput.value = "";
      updateFileSummary();
      loadMedia();
    } catch (err) {
      status.textContent = "";
      showToast("Upload failed: " + err.message, "error");
      uploadBtn.disabled = false;
    }
  });

  return div;
}

function renderStages() {
  const list = document.getElementById("stage-list");
  const rec = recommendedStage();
  list.innerHTML = "";
  stages.forEach(stage => {
    // Media panel sits right before "Assemble the video", since you need your
    // clips in place before that stage makes sense to run.
    if (stage.id === "video") {
      list.appendChild(buildMediaPanelElement());
    }

    const info = STAGE_INFO[stage.id] || { title: stage.label, desc: "" };
    const state = stageState[stage.id] || "idle";
    const isRunningThis = state === "running";
    const div = document.createElement("div");
    div.className = "card stage " + state + (stage.id === rec ? " recommended" : "");
    const icon = state === "done" ? "✓" : state === "running" ? "…" : state === "failed" ? "!" : (STAGE_ORDER.indexOf(stage.id) + 1);
    const statusLabel = { idle: "Not started yet", running: "Running", done: "Done", failed: "Something went wrong" }[state];
    const elapsedSpan = isRunningThis ? `<span class="stage-elapsed" id="elapsed-${stage.id}">0s</span>` : "";
    const audioPlayer = (stage.id === "audio" && state === "done")
      ? `<div class="audio-player" data-audio-player>
          <button class="audio-play-btn" type="button" aria-label="Play narration">
            <svg class="icon-play" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5v11l10-5.5z"/></svg>
            <svg class="icon-pause" viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5h3v11H4zM9 2.5h3v11H9z"/></svg>
          </button>
          <div class="audio-track" data-audio-track><div class="audio-progress" data-audio-progress></div></div>
          <span class="audio-time" data-audio-time>0:00 / 0:00</span>
          <audio data-audio-el src="/api/audio/latest?t=${audioCacheBust || 0}" preload="metadata" style="display:none;"></audio>
        </div>`
      : "";
    const btnLabel = isRunningThis ? "Running…" : (state === "failed" ? "Retry" : "Run");
    const btnDisabled = isRunningThis || (anyStageRunning && !isRunningThis);
    div.innerHTML = `
      <div class="stage-index">${icon}</div>
      <div class="stage-body">
        <p class="stage-title">${info.title}</p>
        <p class="stage-desc">${info.desc}</p>
        <div class="stage-status">${statusLabel}${elapsedSpan}</div>
        ${audioPlayer}
      </div>
      <button class="run-btn" data-stage="${stage.id}" ${btnDisabled ? "disabled" : ""}>${btnLabel}</button>
    `;
    div.querySelector(".run-btn").addEventListener("click", () => runStage(stage.id));
    const audioPlayerRoot = div.querySelector("[data-audio-player]");
    if (audioPlayerRoot) initAudioPlayer(audioPlayerRoot);
    list.appendChild(div);
  });
  loadMedia(); // repopulate the grid inside the freshly-inserted media panel
}

// Native <audio controls> renders as the browser's own light-themed widget —
// it can't be restyled to match the dark UI (it's shadow-DOM, CSS can't
// reach inside it). This drives a hidden <audio> element with our own
// play/pause button, seek bar, and time label instead.
function initAudioPlayer(root) {
  const audio = root.querySelector("[data-audio-el]");
  const playBtn = root.querySelector(".audio-play-btn");
  const track = root.querySelector("[data-audio-track]");
  const progress = root.querySelector("[data-audio-progress]");
  const timeLabel = root.querySelector("[data-audio-time]");

  const fmt = (s) => {
    if (!isFinite(s) || s < 0) return "0:00";
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, "0");
    return `${m}:${sec}`;
  };

  const updateDisplay = () => {
    const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
    progress.style.width = pct + "%";
    timeLabel.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  };

  playBtn.addEventListener("click", () => {
    if (audio.paused) audio.play(); else audio.pause();
  });
  audio.addEventListener("play", () => root.classList.add("playing"));
  audio.addEventListener("pause", () => root.classList.remove("playing"));
  audio.addEventListener("ended", () => root.classList.remove("playing"));
  audio.addEventListener("timeupdate", updateDisplay);
  audio.addEventListener("loadedmetadata", updateDisplay);

  const seek = (clientX) => {
    if (!isFinite(audio.duration)) return;
    const rect = track.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
    audio.currentTime = ratio * audio.duration;
    updateDisplay();
  };
  track.addEventListener("click", (e) => seek(e.clientX));

  updateDisplay();
}

async function loadStages() {
  try {
    const res = await fetch("/api/stages");
    if (!res.ok) throw new Error(`Server responded with ${res.status}`);
    stages = await res.json();
    stages.forEach(s => { if (!stageState[s.id]) stageState[s.id] = "idle"; });
    renderStages();
  } catch (err) {
    document.getElementById("stage-list").innerHTML =
      `<div class="card error-card">
        Couldn't load pipeline steps: ${err.message}.<br>
        Make sure you opened this page as <b>http://localhost:4000</b> (not by double-clicking the file), and that the dashboard server is still running in your terminal.
      </div>`;
    console.error("loadStages failed:", err);
  }
}

async function runStage(id) {
  if (anyStageRunning) {
    showToast("Another step is already running. Wait for it to finish.", "error");
    return;
  }

  // The script stage is the one that actually reads niche/format/voice/speed
  // — save whatever's currently picked in the Video settings card right
  // before kicking it off, so this run uses it.
  if (id === "script") {
    const saved = await saveRunConfig();
    if (!saved) return; // saveRunConfig already showed a toast explaining why
  }

  anyStageRunning = true;
  stageState[id] = "running";
  stageStartTimes[id] = Date.now();
  document.getElementById("log-output").textContent = "";
  renderStages();
  startElapsedTimer();

  try {
    const res = await fetch("/api/run/" + id, { method: "POST" });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "Unknown error" }));
      throw new Error(err.error || "Failed to start step");
    }
  } catch (err) {
    anyStageRunning = false;
    stageState[id] = "failed";
    stopElapsedTimer();
    showToast(err.message, "error");
    renderStages();
  }
}

document.getElementById("console-toggle").addEventListener("click", () => {
  const panel = document.getElementById("console-panel");
  const open = panel.classList.toggle("open");
  document.getElementById("console-toggle").textContent = "▾ " + (open ? "Hide" : "Show") + " technical details";
});

const evtSource = new EventSource("/api/stream");
evtSource.addEventListener("log", (e) => {
  const { text } = JSON.parse(e.data);
  const out = document.getElementById("log-output");
  out.textContent += text;
  out.scrollTop = out.scrollHeight;
});
evtSource.addEventListener("state", (e) => {
  const state = JSON.parse(e.data);
  const wasRunning = stageState[state.stageId] === "running";
  stageState[state.stageId] = state.running ? "running" : (state.exitCode === 0 ? "done" : "failed");
  anyStageRunning = state.running;

  if (state.running) {
    if (!stageStartTimes[state.stageId]) stageStartTimes[state.stageId] = Date.now();
    startElapsedTimer();
  } else {
    stopElapsedTimer();
    const title = (STAGE_INFO[state.stageId] || {}).title || state.stageId;
    if (state.exitCode === 0) {
      showToast(`${title} finished.`, "success");
    } else if (wasRunning) {
      showToast(`${title} failed. Check technical details for the error.`, "error");
    }
  }

  if (state.stageId === "audio" && !state.running && state.exitCode === 0) {
    audioCacheBust = Date.now();
  }
  if (state.stageId === "script" && !state.running && state.exitCode === 0) {
    loadMedia();
  }
  renderStages();
});
evtSource.onerror = () => {
  showToast("Lost connection to the dashboard server. Logs may be delayed.", "error", 6000);
};

// ---------- History ----------
function formatRelative(dateStr) {
  const then = new Date(dateStr);
  if (isNaN(then)) return "";
  const days = Math.floor((Date.now() - then.getTime()) / 86400000);
  if (days <= 0) return "today";
  if (days === 1) return "yesterday";
  if (days < 7) return `${days}d ago`;
  const weeks = Math.floor(days / 7);
  if (weeks < 5) return `${weeks}w ago`;
  return `${Math.floor(days / 30)}mo ago`;
}

async function loadHistory() {
  const container = document.getElementById("history-list");
  renderSkeleton(container, 3);
  try {
    const res = await fetch("/api/history");
    if (!res.ok) throw new Error(`Server responded with ${res.status}`);
    const items = await res.json();
    if (!items.length) {
      container.innerHTML = '<div class="card empty-state">No videos yet. Run through the Pipeline tab to make your first one.</div>';
      return;
    }
    container.innerHTML = "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "card history-card";
      const relative = formatRelative(item.date);
      const status = item.youtube
        ? `
          <span class="pill private">${item.youtube.privacyStatus}</span>
          <a class="youtube-link-btn" href="${item.youtube.url}" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8ZM9.6 15.6V8.4L15.8 12Z"/></svg>
            Watch on YouTube
          </a>
          <button class="copy-link-btn" data-url="${item.youtube.url}">Copy link</button>
        `
        : `<span class="pill none">Not uploaded</span>`;
      div.innerHTML = `
        <video src="/api/video/${item.videoFile}" muted controls preload="metadata" playsinline></video>
        <div class="history-meta">
          <p class="history-title">${item.subject || "Unknown"} · ${item.focus || "?"}${item.format === "short" ? " · Shorts" : ""}</p>
          <p class="history-sub">${item.date}${relative ? " · " + relative : ""}</p>
          <div class="history-status">${status}</div>
        </div>
      `;
      const copyBtn = div.querySelector(".copy-link-btn");
      if (copyBtn) {
        copyBtn.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(copyBtn.dataset.url);
            showToast("Link copied.", "success", 2000);
          } catch {
            showToast("Couldn't copy. Copy the link manually instead.", "error");
          }
        });
      }
      container.appendChild(div);
    });
  } catch (err) {
    renderErrorCard(container, err.message);
    console.error("loadHistory failed:", err);
  }
}

// ---------- Pronunciations ----------
async function loadPronunciations() {
  const list = document.getElementById("pron-list");
  const countBadge = document.getElementById("pron-count");
  try {
    const res = await fetch("/api/pronunciations");
    if (!res.ok) throw new Error(`Server responded with ${res.status}`);
    const dict = await res.json();
    const entries = Object.entries(dict);
    countBadge.textContent = entries.length;
    list.innerHTML = "";
    if (!entries.length) {
      list.innerHTML = '<div class="empty-state" style="padding:20px 0;">No pronunciation fixes yet. Add one above.</div>';
      return;
    }
    entries.forEach(([word, respelling]) => {
      const div = document.createElement("div");
      div.className = "pron-row";
      div.innerHTML = `
        <span class="pron-text"><b>${word}</b><span class="pron-arrow">→</span>${respelling}</span>
        <button class="remove-btn">Remove</button>
      `;
      div.querySelector("button").addEventListener("click", async () => {
        try {
          const res2 = await fetch("/api/pronunciations/" + encodeURIComponent(word), { method: "DELETE" });
          if (!res2.ok) throw new Error(`Server responded with ${res2.status}`);
          showToast(`Removed "${word}".`, "success", 2000);
          loadPronunciations();
        } catch (err) {
          showToast("Couldn't remove that fix: " + err.message, "error");
        }
      });
      list.appendChild(div);
    });
  } catch (err) {
    countBadge.textContent = "N/A";
    renderErrorCard(list, err.message);
    console.error("loadPronunciations failed:", err);
  }
}

document.getElementById("pron-add-btn").addEventListener("click", async () => {
  const wordInput = document.getElementById("pron-word");
  const respellingInput = document.getElementById("pron-respelling");
  const word = wordInput.value.trim();
  const respelling = respellingInput.value.trim();
  if (!word || !respelling) {
    showToast("Enter both a name and how to say it.", "error", 2500);
    return;
  }
  const btn = document.getElementById("pron-add-btn");
  btn.disabled = true;
  try {
    const res = await fetch("/api/pronunciations", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ word, respelling }),
    });
    if (!res.ok) throw new Error(`Server responded with ${res.status}`);
    wordInput.value = "";
    respellingInput.value = "";
    showToast(`Added "${word}".`, "success", 2000);
    loadPronunciations();
  } catch (err) {

// ---------- Media manager ----------
async function loadMedia() {
  const gridEl = document.getElementById("media-grid");
  const labelEl = document.getElementById("media-stem-label");
  const clearBtn = document.getElementById("clear-media-btn");
  if (!gridEl) return; // media panel isn't mounted yet (e.g. stages haven't loaded)

  try {
    const res = await fetch("/api/media");
    if (!res.ok) throw new Error(`Server responded with ${res.status}`);
    const { stem, files } = await res.json();

    labelEl.textContent = stem ? stem : "No script generated yet";
    if (clearBtn) clearBtn.style.display = files.length ? "inline-block" : "none";

    gridEl.innerHTML = "";
    if (!files.length) {
      gridEl.innerHTML = '<span style="font-size:12px; color:var(--text-faint);">No media added yet.</span>';
      return;
    }
    files.forEach((filename, i) => {
      const ext = filename.split(".").pop().toLowerCase();
      const isVideo = VIDEO_EXT.has(ext);
      const tile = document.createElement("div");
      tile.className = "media-tile";
      tile.innerHTML = `
        <span class="order-badge">${i + 1}</span>
        ${isVideo
          ? `<video src="/api/media/file/${filename}" muted preload="metadata" playsinline></video>`
          : `<img src="/api/media/file/${filename}" loading="lazy" />`}
        <button class="remove-tile-btn" title="Remove" aria-label="Remove ${filename}">×</button>
      `;
      tile.querySelector(".remove-tile-btn").addEventListener("click", async () => {
        const ok = await showConfirm(`This removes it from today's media folder.`, {
          title: `Remove ${filename}?`, confirmLabel: "Remove", cancelLabel: "Cancel",
        });
        if (!ok) return;
        try {
          const res2 = await fetch("/api/media/" + encodeURIComponent(filename), { method: "DELETE" });
          if (!res2.ok) throw new Error(`Server responded with ${res2.status}`);
          showToast(`Removed ${filename}.`, "success", 2000);
          loadMedia();
        } catch (err) {
          showToast("Couldn't remove that file: " + err.message, "error");
        }
      });
      gridEl.appendChild(tile);
    });
  } catch (err) {
    gridEl.innerHTML = `<span style="font-size:12px; color:var(--red-bright);">Couldn't load media: ${err.message}</span>`;
    if (clearBtn) clearBtn.style.display = "none";
    console.error("loadMedia failed:", err);
  }
}

// ---------- Video settings (niche / format / voice / speed) ----------

let selectedFormat = "long";
let speedBounds = { min: 0.75, max: 1.3 };
let nicheById = {};
let voiceById = {};

async function loadRunSettings() {
  const nicheSelect = document.getElementById("niche-select");
  const voiceSelect = document.getElementById("voice-select");
  const speedInput = document.getElementById("speed-input");

  try {
    const [nichesRes, voicesRes, configRes] = await Promise.all([
      fetch("/api/niches"),
      fetch("/api/voices"),
      fetch("/api/run-config"),
    ]);
    if (!nichesRes.ok || !voicesRes.ok || !configRes.ok) throw new Error("Server error");

    const niches = await nichesRes.json();
    const { voices, minSpeed, maxSpeed } = await voicesRes.json();
    const config = await configRes.json();
    speedBounds = { min: minSpeed, max: maxSpeed };
    nicheById = Object.fromEntries(niches.map(n => [n.id, n]));
    voiceById = Object.fromEntries(voices.map(v => [v.id, v]));

    nicheSelect.innerHTML = niches.map(n => `<option value="${n.id}">${n.label}</option>`).join("");
    voiceSelect.innerHTML = voices.map(v => `<option value="${v.id}">${v.label}</option>`).join("");

    // Michael is the recommended default — falls back to it whenever no
    // saved run-config exists yet, same as the server does in /api/run-config.
    nicheSelect.value = config.niche || "anime-superhero";
    document.getElementById("custom-niche-input").value = config.customNiche || "";
    voiceSelect.value = config.voice || voices[0]?.id;

    speedInput.min = minSpeed;
    speedInput.max = maxSpeed;
    speedInput.value = config.speed ?? 1.0;
    document.getElementById("speed-value").textContent = `${(+speedInput.value).toFixed(2)}x`;

    setFormat(config.format || "long");
    toggleCustomNicheRow();
  } catch (err) {
    showToast("Couldn't load video settings: " + err.message, "error");
    console.error("loadRunSettings failed:", err);
  }
}

function toggleCustomNicheRow() {

function setFormat(format) {
  selectedFormat = format;
  document.querySelectorAll("#format-toggle button").forEach(btn => {

}

document.getElementById("niche-select").addEventListener("change", () => {

});

document.getElementById("speed-input").addEventListener("input", (e) => {
